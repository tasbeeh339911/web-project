<body>
    
    <section class="add_courses">
       <main class="container">    
            <nav>
                <a class="logo" href ="#"> EDU ISLAND </a>

                    <li> <a href ="index.html"> Home </a></li>

    <section class="formAdd">
         <form>
            <h1>ADD COURSES</h1>

            <div>
                <label for="courseName">Course name</label>
                <br>
                <input class="userinput" id="courseName" type="text" required>
            </div>

            <div>
                <label for="Instructor">Instructor</label>
                <br>
                <input class="userinput" id="Instructor" type="text" required>
            </div>

            <div>
                <label for="credit hours">credit hours</label>
                <br>
                <input class="userinput" id="credit hours" type="number" required min="1" max="6">
            </div>

            <div>
                <label for="Notes">Notes</label>
                <br>
                <input class="userinput" id="Notes" type="text">
            </div>
            <input class="submit" type="submit" value="Add">
        </form>

    </section>
       
    </section>
